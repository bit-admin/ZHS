appId: com.zhs.autovisor.electron
productName: ZHS Autovisor
directories:
  output: dist
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
