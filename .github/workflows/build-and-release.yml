name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-14
            command: npm run build:mac
            artifact: macos-installers
            files: |
              zhs-electron/dist/*.dmg
              zhs-electron/dist/*.dmg.blockmap
          - platform: Windows
            os: windows-latest
            command: npm run build:win
            artifact: windows-installers
            files: |
              zhs-electron/dist/*.exe
              zhs-electron/dist/*.exe.blockmap

    defaults:
      run:
        working-directory: zhs-electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: zhs-electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.command }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="main-${RUN_NUMBER}-${SHA:0:7}"
          gh release create "$tag" release-assets/* \
            --title "ZHS Autovisor ${tag}" \
            --notes "Automated release for ${SHA}" \
            --target "$SHA" \
            --repo "$GH_REPO"
